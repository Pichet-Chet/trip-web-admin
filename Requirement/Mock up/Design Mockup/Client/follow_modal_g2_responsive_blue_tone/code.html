<!DOCTYPE html>

<html class="light" lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#1978e5",
              "on-primary": "#ffffff",
              "secondary": "#475569",
              "surface": "#f8fafc",
              "surface-container": "#ffffff",
              "on-surface": "#0f172a",
              "on-surface-variant": "#64748b",
              "outline": "#e2e8f0",
              "outline-variant": "#f1f5f9",
              "line-green": "#06C755",
              "web-push-blue": "#3b82f6"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "3xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-blur { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#f1f5f9] font-body text-on-surface antialiased min-h-screen flex items-end md:items-center justify-center p-0 md:p-6">
<!-- Background Content Mockup (G1 View) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-30 grayscale pointer-events-none p-4">
<div class="max-w-4xl mx-auto space-y-8">
<div class="h-64 rounded-2xl bg-slate-200 overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="Stunning aerial view of Phuket islands" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYhA63jAcg0CSPSaxbykebrJrSMedB6-95Sz7giY0IsNLIsd0m8Z58EkTndoOfGxVRi9eLLDBmekbtSmJZZekBc2tqiB6PYdpntsBGw4U2F2TeBP54bhhB3M6WHpk1SUJ3WqsrnjhHwC6fWwIWEoo8W7JWPAFQmKhg4UQdpg0TmlZmeLikX0Ji_GopuB7VAzqEkUUSUxWijM3Fgeah9__YnQ2TY06rVGmvGnlPa9bHDVfVbWFvtn33da0utk9lmeXw1W6jmFazIrep"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<div class="h-32 bg-slate-200 rounded-xl"></div>
<div class="h-32 bg-slate-200 rounded-xl"></div>
<div class="h-32 bg-slate-200 rounded-xl"></div>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40"></div>
<!-- Follow Modal Container (G2) -->
<main class="relative z-50 w-full max-w-lg bg-surface-container rounded-t-3xl md:rounded-2xl shadow-2xl overflow-hidden transition-all transform animate-in slide-in-from-bottom duration-500">
<!-- Close Button (Desktop/Tablet) -->
<button class="absolute top-4 right-4 z-50 w-8 h-8 rounded-full bg-slate-100 text-slate-500 hidden md:flex items-center justify-center hover:bg-slate-200 transition-all">
<span class="material-symbols-outlined text-xl">close</span>
</button>
<!-- Header Section -->
<div class="px-6 md:px-10 pt-10 pb-6 text-center border-b border-outline-variant">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/10 text-primary mb-5">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
<h1 class="font-headline font-extrabold text-2xl tracking-tight text-slate-900 mb-2">ติดตามทริปนี้</h1>
<p class="text-on-surface-variant text-sm max-w-xs mx-auto">รับข้อมูลอัปเดตสำคัญจากไกด์แบบเรียลไทม์ เพื่อให้คุณไม่พลาดทุกรายละเอียด</p>
</div>
<!-- Content Body -->
<div class="px-6 md:px-10 py-8 space-y-8">
<!-- Notification Channels -->
<div class="space-y-4">
<label class="font-headline font-bold text-[11px] uppercase tracking-[0.15em] text-on-surface-variant">เลือกช่องทางรับข่าวสาร</label>
<div class="grid grid-cols-1 gap-3">
<!-- LINE Card -->
<button class="group relative w-full text-left p-4 rounded-xl border border-outline hover:border-line-green/50 hover:bg-line-green/[0.02] transition-all focus:ring-2 focus:ring-line-green/20 outline-none">
<div class="absolute -top-2.5 right-4 bg-line-green text-white text-[10px] font-bold px-2.5 py-1 rounded-full shadow-sm z-10">
                        แนะนำ
                    </div>
<div class="flex items-center gap-4">
<div class="w-11 h-11 bg-white border border-outline rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-line-green text-2xl">chat_bubble</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 text-sm">LINE OA Notifications</p>
<p class="text-[12px] text-on-surface-variant">อัปเดตผ่านบัญชีทางการ LINE</p>
</div>
<span class="material-symbols-outlined text-line-green opacity-0 group-hover:opacity-100 transition-opacity">check_circle</span>
</div>
</button>
<!-- Web Push Card -->
<button class="group w-full text-left p-4 rounded-xl border border-outline hover:border-primary/50 hover:bg-primary/[0.02] transition-all focus:ring-2 focus:ring-primary/20 outline-none">
<div class="flex items-center gap-4">
<div class="w-11 h-11 bg-white border border-outline rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-2xl">notifications</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 text-sm">Web Browser Push</p>
<p class="text-[12px] text-on-surface-variant">แจ้งเตือนผ่านบราวเซอร์ของคุณ</p>
</div>
<span class="material-symbols-outlined text-primary opacity-0 group-hover:opacity-100 transition-opacity">check_circle</span>
</div>
</button>
</div>
</div>
<!-- Name Input Field -->
<div class="space-y-3">
<label class="font-headline font-bold text-[11px] uppercase tracking-[0.15em] text-on-surface-variant" for="guest-name">ระบุชื่อของคุณ</label>
<div class="relative group">
<input class="w-full h-12 bg-slate-50 border border-outline rounded-lg px-4 pr-10 font-medium text-slate-900 focus:ring-2 focus:ring-primary/10 focus:border-primary focus:bg-white transition-all placeholder:text-slate-400 text-sm" id="guest-name" placeholder="ชื่อ-นามสกุล หรือชื่อเล่น..." type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300">
<span class="material-symbols-outlined text-xl">person</span>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary/60 text-lg">info</span>
<p class="text-[11px] text-on-surface-variant italic">ไกด์จะใช้ชื่อนี้เพื่อระบุตัวตนในรายการผู้ติดตาม</p>
</div>
</div>
<!-- Actions -->
<div class="pt-2 space-y-3">
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Confirm &amp; Follow
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full py-3 text-on-surface-variant hover:text-slate-900 font-semibold text-xs transition-colors uppercase tracking-widest text-center">
                Not now, maybe later
            </button>
</div>
</div>
<!-- Subdued Decor -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary/10 to-transparent"></div>
</main>
<!-- Close Button (Mobile Bottom Floating) -->
<button class="fixed bottom-8 left-1/2 -translate-x-1/2 md:hidden z-[60] px-6 py-2.5 rounded-full bg-slate-900/10 backdrop-blur-md text-slate-900 font-bold text-xs flex items-center gap-2 hover:bg-slate-900/20 transition-all border border-slate-900/10">
<span class="material-symbols-outlined text-lg">close</span>
    ยกเลิก
</button>
</body></html>
