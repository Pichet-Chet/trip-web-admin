name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Type check + unit tests (vitest, node env) ───────────────────────────
  unit:
    name: Type check + Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --reporter=verbose

  # ── E2E tests (Playwright + Chromium) ────────────────────────────────────
  # Uses page.route() mocks — no live API server needed.
  # Runs on push to main; enable for all PRs by removing the `if` condition.
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      NEXT_PUBLIC_API_URL: http://localhost:5100/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Build first so the production server starts faster than dev mode.
      # The playwright webServer config uses `npm run dev`; we override it here
      # via PLAYWRIGHT_BASE_URL so Playwright uses a pre-started server instead.
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5100/api

      - name: Start production server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "Server ready" && break
            echo "Waiting... attempt $i"
            sleep 1
          done

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.run_number }}
          path: test-results/
          retention-days: 7
