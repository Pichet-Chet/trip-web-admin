name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + type checks ───────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

  # ── E2E (Playwright) ──────────────────────────────────────────────���──
  e2e:
    runs-on: ubuntu-latest
    # E2E only runs on push to main to save CI minutes on every PR.
    # Remove the `if` to run on every PR too.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      # The app talks to this; tests mock it via page.route() so no real
      # API server is needed. Just needs to be a valid URL so fetch() calls
      # resolve before the route intercept fires.
      NEXT_PUBLIC_API_URL: http://localhost:5100/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
